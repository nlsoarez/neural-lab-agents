# Neural Lab — Paperclip Configuration
# https://github.com/paperclipai/paperclip

version: "1"

company:
  name: Neural Lab
  companyFilePath: COMPANY.md
  agentsFilePath: AGENTS.md

agents:
  - name: CEO
    adapter: codex_local
    cwd: /app/neural-lab-agents
    model: gpt-5.4-mini
    effort: medium
    maxTurnsPerRun: 18
    timeoutSec: 600
    graceSec: 30
    instructionsFilePath: agents/ceo/instructions.md
    heartbeat: "0 9 * * 1-5"
    env:
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      NEURAL_LAB_ENV: "production"

  - name: Market Intel Agent
    adapter: codex_local
    cwd: /app/neural-lab-agents
    model: gpt-5.4-mini
    effort: medium
    maxTurnsPerRun: 16
    timeoutSec: 600
    graceSec: 30
    instructionsFilePath: agents/market-intel/instructions.md
    heartbeat: "0 7 * * 1-5"
    env:
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      SERPAPI_KEY: "${SERPAPI_KEY}"
      SERPER_API_KEY: "${SERPER_API_KEY}"
      NEURAL_LAB_ENV: "production"

  - name: Marketing & Copy Agent
    adapter: codex_local
    cwd: /app/neural-lab-agents
    model: gpt-5.4-mini
    effort: medium
    maxTurnsPerRun: 16
    timeoutSec: 600
    graceSec: 30
    instructionsFilePath: agents/marketing/instructions.md
    heartbeat: "0 8 * * 1"
    env:
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      NEURAL_LAB_ENV: "production"

  - name: Social Media & Design Agent
    adapter: codex_local
    cwd: /app/neural-lab-agents
    model: gpt-5.4-mini
    effort: medium
    maxTurnsPerRun: 16
    timeoutSec: 900
    graceSec: 30
    instructionsFilePath: agents/social/instructions.md
    heartbeat: "0 10 * * 1"
    env:
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_IMAGE_MODEL: "gpt-image-2"
      NEURAL_LAB_ENV: "production"

  - name: Pricing & Proposals Agent
    adapter: codex_local
    cwd: /app/neural-lab-agents
    model: gpt-5.4-mini
    effort: low
    maxTurnsPerRun: 12
    timeoutSec: 480
    graceSec: 30
    instructionsFilePath: agents/pricing/instructions.md
    heartbeat: triggered
    env:
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      NEURAL_LAB_ENV: "production"

# Planning token ceilings per day per agent. Also set real monthly USD budgets
# in Paperclip UI/API, because Paperclip enforces budgetMonthlyCents there.
budgets:
  CEO: 60000
  "Market Intel Agent": 80000
  "Marketing & Copy Agent": 70000
  "Social Media & Design Agent": 90000
  "Pricing & Proposals Agent": 50000

# Workspace strategy
workspace:
  strategy: git_worktree
  defaultBranch: main

# Approval workflows
approvals:
  - trigger: "issue.tag == 'PROPOSTA' && issue.value > 10000"
    requiredApprovers: ["human"]
    description: "Propostas acima de R$10k requerem aprovação humana"
  - trigger: "issue.tag == 'PUBLICAR'"
    requiredApprovers: ["CEO"]
    description: "Publicação de conteúdo externo requer aprovação do CEO Agent"
