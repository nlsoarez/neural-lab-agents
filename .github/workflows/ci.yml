name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  telegram-gateway:
    name: telegram-gateway (test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: telegram-gateway

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: telegram-gateway/package-lock.json

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npm test

      - run: npm run build
